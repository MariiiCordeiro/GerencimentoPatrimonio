<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Patrimônios - Gestão de Patrimônios</title>

    <link rel="stylesheet" href="listaPatrimoniosPorSala.css">
    <script src="https://kit.fontawesome.com/193783e0a6.js" crossorigin="anonymous"></script>
</head>

<body>
    <main class="page-content">
        <section class="page-header layout_guide" aria-labelledby="titulo-patrimonios">
            <h1 id="titulo-patrimonios">Patrimônios: Sala 09/10</h1>

            <form class="search-area" role="search">
                <label for="pesquisa-ambiente" class="sr-only">Pesquisar patrimônios</label>

                <input type="search" id="pesquisa-ambiente" name="pesquisaAmbiente" placeholder="Pesquise o ambiente">

                <button type="button" class="filter-button" aria-label="Filtrar patrimonios">
                    <i class="fa-solid fa-sliders"></i>
                </button>
            </form>
        </section>

        <section class="table-section layout_guide" aria-label="Lista de patrimonios">
            <table class="environment-table">
                <thead>
                    <tr>
                        <th>Patrimônio</th>
                        <th>Denominação</th>
                        <th>Tipo</th>
                        <th>Data transfêrencia</th>
                        <th>Detalhes</th>
                        <th>Transferir</th>
                    </tr>
                </thead>

                <tbody>
                    <tr class="">
                        <td>1236808</td>
                        <td>MESA TRAPEZOIDAL DC-1987a</td>
                        <td>Mesa</td>
                        <td>11/02/26</td>
                        <td>
                            <a href="#" aria-label="Ver detalhes do patrimonio">
                                <i class="fa-solid fa-circle-info"></i>
                            </a>
                        </td>
                        <td>
                            <a href="#" aria-label="Transferir patrimonio">
                                <i class="fa-solid fa-arrow-right-arrow-left"></i>
                            </a>
                        </td>
                    </tr>
                </tbody>
            </table>
        </section>
        <Navegacao/>
    </main>
</body>

</html>
